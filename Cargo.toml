[workspace]
resolver = "2"
members = [
    "lntrn-compositor",
    "lntrn-context-menu",
    "lntrn-ui",
    "lntrn-render",
    "lntrn-fox-file-manager",
    "lntrn-bar",
    "lntrn-terminal",
    "lntrn-image-viewer",
    "lntrn-video-player",
    "lntrn-music-player",
    "lntrn-session-manager",
    "lntrn-system-settings",
    "lntrn-test-window",
]

[profile.release]
opt-level = 2
strip = true
incremental = false

[profile.release.package.lntrn-music-player]
opt-level = 3
