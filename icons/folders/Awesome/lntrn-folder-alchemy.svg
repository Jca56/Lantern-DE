      <path d="M70,82 Q66,76 66,72 Q66,65 70,65 L78,65 Q82,65 82,72 Q82,76 78,82 Z" fill="url(#potion3)"/>
      <rect x="71" y="62" width="6" height="4" rx="1" fill="#1a1030"/>
      <ellipse cx="74" cy="70" rx="4" ry="3" fill="#ddbbff" opacity="0.35"/>
    </g>
    <!-- Book on shelf -->
    <rect x="82" y="68" width="7" height="14" rx="1" fill="#3a1a00" stroke="#6a3a00" stroke-width="0.8"/>
    <line x1="85" y1="68" x2="85" y2="82" stroke="#6a3a00" stroke-width="0.8"/>
    <!-- Arcane circle on floor -->
    <circle cx="50" cy="96" r="8" fill="none" stroke="#3a2a0a" stroke-width="0.8" opacity="0.5"/>
    <circle cx="50" cy="96" r="5" fill="none" stroke="#3a2a0a" stroke-width="0.8" opacity="0.4"/>
  
    </g>
  </g>
  
  <!-- Scene border -->
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#daa520" stroke-width="1.5" opacity="0.25"/>
  <!-- Top highlight on scene -->  
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <!-- Bottom shadow on scene -->
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

