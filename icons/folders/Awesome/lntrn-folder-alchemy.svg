      <path d="M26,62 Q24,56 26,52 Q28,48 26,44" fill="none" stroke="#44ffcc" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M26,60 Q29,55 27,51" fill="none" stroke="#44ffcc" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Potion 2 - pink -->
