<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#704a00"/><stop offset="0.4" stop-color="#4a2e00"/><stop offset="1" stop-color="#1a0e00"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(140, 95, 10);"/><stop offset="0.35" style="stop-color: rgb(100, 65, 5);"/><stop offset="1" stop-color="#3a2200"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ffe8c0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#daa520" stop-opacity="0.7"/><stop offset="1" stop-color="#704a00" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter><linearGradient id="alchBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0a05"/><stop offset="100%" stop-color="#070502"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aa6600"/><stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="potion1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44ffcc"/><stop offset="100%" stop-color="#00aa88"/>
    </linearGradient>
    <linearGradient id="potion2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff44aa"/><stop offset="100%" stop-color="#aa0066"/>
    </linearGradient>
    <linearGradient id="potion3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aa88ff"/><stop offset="100%" stop-color="#440088"/>
    </linearGradient>
    <filter id="potionGlow1" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00ffcc" flood-opacity="0.9"/>
    </filter>
    <filter id="potionGlow2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff44aa" flood-opacity="0.9"/>
    </filter>
    <filter id="potionGlow3" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#aa88ff" flood-opacity="0.9"/>
    </filter>
