      <path d="M46,82 Q41,75 41,70 Q41,62 46,62 L56,62 Q61,62 61,70 Q61,75 56,82 Z" fill="url(#potion2)"/>
      <rect x="47" y="58" width="8" height="5" rx="1" fill="#2a1020"/>
      <ellipse cx="51" cy="68" rx="5" ry="3.5" fill="#ff88cc" opacity="0.35"/>
      <!-- Bubbles -->
      <circle cx="48" cy="72" r="1.5" fill="#ffaadd" opacity="0.6"/>
      <circle cx="54" cy="68" r="1"   fill="#ffaadd" opacity="0.5"/>
    </g>
    <!-- Smoke from potion 2 -->
    <g filter="url(#smokeG)" opacity="0.5">
      <path d="M51,58 Q49,52 51,48 Q53,44 51,40" fill="none" stroke="#ff44aa" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Potion 3 - purple -->
