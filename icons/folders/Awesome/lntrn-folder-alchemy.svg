      <rect x="23" y="62" width="6" height="4" rx="1" fill="#2a3a30"/>
      <ellipse cx="26" cy="70" rx="4" ry="3" fill="#88ffee" opacity="0.4"/>
    </g>
    <!-- Smoke from potion 1 -->
