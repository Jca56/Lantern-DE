<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#1a6090"/><stop offset="0.4" stop-color="#0e3860"/><stop offset="1" stop-color="#04182a"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(40, 120, 180);"/><stop offset="0.35" style="stop-color: rgb(20, 80, 140);"/><stop offset="1" stop-color="#082040"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#d8f0ff" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#66ccff" stop-opacity="0.7"/><stop offset="1" stop-color="#1a6090" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter><linearGradient id="iceBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040d1a"/><stop offset="100%" stop-color="#020810"/>
    </linearGradient>
    <linearGradient id="glacierG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88ddff"/><stop offset="100%" stop-color="#2266aa"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44ccff"/><stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <filter id="iceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#44ccff" flood-opacity="0.8"/>
    </filter>
    <filter id="auroraG" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#44ccff"/><stop offset="100%" stop-color="#0088cc"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene content -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#iceBack)"/>
    <!-- Faint aurora -->
    <g filter="url(#auroraG)" opacity="0.4">
      <path d="M7,58 Q30,52 50,58 Q70,64 93,55" fill="none" stroke="#00ffaa" stroke-width="8"/>
      <path d="M7,62 Q35,56 55,63 Q75,70 93,60" fill="none" stroke="#0088ff" stroke-width="5"/>
    </g>
    <!-- Stars -->
    <circle cx="15" cy="52" r="0.8" fill="#cceeff" opacity="0.8"/>
    <circle cx="28" cy="50" r="0.6" fill="#cceeff" opacity="0.7"/>
    <circle cx="44" cy="53" r="0.8" fill="#cceeff" opacity="0.6"/>
    <circle cx="62" cy="50" r="0.6" fill="#cceeff" opacity="0.8"/>
    <circle cx="78" cy="52" r="0.8" fill="#cceeff" opacity="0.7"/>
    <circle cx="88" cy="50" r="0.6" fill="#cceeff" opacity="0.6"/>
    <!-- Glacier -->
    <g filter="url(#iceGlow)">
      <polygon points="7,98 7,78 20,60 30,72 42,55 52,68 62,52 72,65 82,58 93,70 93,98" fill="url(#glacierG)" opacity="0.9"/>
      <!-- Ice cracks -->
      <line x1="25" y1="72" x2="30" y2="85" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
      <line x1="50" y1="70" x2="55" y2="88" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
      <line x1="70" y1="68" x2="73" y2="82" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
      <!-- Snow top highlights -->
      <polygon points="7,78 20,60 30,72 42,55 52,68 62,52 72,65 82,58 93,70 93,75 80,63 70,70 60,56 50,72 40,59 28,76 18,65 7,82" fill="#cceeff" opacity="0.3"/>
    </g>
    <!-- Polar bear -->
    <g opacity="0.85">
      <ellipse cx="22" cy="88" rx="8" ry="5" fill="#ddeeff"/>
      <circle cx="22" cy="83" r="4" fill="#ddeeff"/>
      <ellipse cx="18" cy="85" rx="2" ry="3.5" fill="#ddeeff"/>
      <ellipse cx="26" cy="85" rx="2" ry="3.5" fill="#ddeeff"/>
      <circle cx="20" cy="82" r="0.8" fill="#334455"/>
      <circle cx="24" cy="82" r="0.8" fill="#334455"/>
      <ellipse cx="22" cy="84" rx="1.5" ry="1" fill="#bbccdd"/>
    </g>
    <!-- Ocean water -->
    <rect x="7" y="93" width="86" height="5" fill="#001833" opacity="0.7"/>
    <path d="M7,93 Q25,91 40,93 Q55,95 70,92 Q80,90 93,93" fill="none" stroke="#44aaff" stroke-width="0.8" opacity="0.5"/>
  
    </g>
  </g>
  
  <!-- Scene border -->
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#66ccff" stroke-width="1.5" opacity="0.25"/>
  <!-- Top highlight on scene -->  
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <!-- Bottom shadow on scene -->
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>