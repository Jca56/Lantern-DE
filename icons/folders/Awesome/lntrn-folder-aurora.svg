    <polygon points="75,88 80,70 85,88" fill="#001a0a" opacity="0.8"/>
    <polygon points="70,88 74,75 78,88" fill="#001a0a" opacity="0.7"/>
  
    </g>
  </g>
  
  <!-- Scene border -->
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#44ffaa" stroke-width="1.5" opacity="0.25"/>
