<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#6a4a00"/><stop offset="0.4" stop-color="#402c00"/><stop offset="1" stop-color="#1a0f00"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(130, 92, 0);"/><stop offset="0.35" style="stop-color: rgb(88, 60, 0);"/><stop offset="1" stop-color="#2a1c00"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff8d0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#eebb30" stop-opacity="0.7"/><stop offset="1" stop-color="#6a4a00" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="casinoBack" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/><stop offset="100%" stop-color="#0d0800"/>
    </linearGradient>
    <linearGradient id="reelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1800"/><stop offset="100%" stop-color="#1a0f00"/>
    </linearGradient>
    <linearGradient id="sevenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/><stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="goldGlowC" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffcc00" flood-opacity="0.9"/>
    </filter>
    <filter id="sevenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff4444" flood-opacity="1"/>
    </filter>
    <filter id="jackpotGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffcc00" flood-opacity="1"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#cc9900"/><stop offset="50%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#cc9900"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#casinoBack)"/>
    <!-- Slot machine frame -->
    <g filter="url(#goldGlowC)">
      <rect x="10" y="52" width="80" height="36" rx="4" fill="#1a0f00" stroke="#cc9900" stroke-width="2"/>
      <!-- Reel windows -->
      <rect x="14" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <rect x="40" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <rect x="66" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <!-- Win line -->
      <line x1="10" y1="70" x2="90" y2="70" stroke="#ffcc00" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
    </g>
    <!-- The 7s -->
    <g filter="url(#sevenGlow)">
      <text x="16" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
      <text x="42" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
      <text x="68" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
    </g>
    <!-- JACKPOT text -->
    <g filter="url(#jackpotGlow)">
      <text x="18" y="52" font-family="Arial Black, sans-serif" font-size="5.5" font-weight="900" fill="#ffcc00" letter-spacing="2">JACKPOT</text>
    </g>
    <!-- Coin slot -->
    <rect x="44" y="90" width="12" height="3" rx="1.5" fill="#664400" stroke="#cc9900" stroke-width="1"/>
    <!-- Handle -->
    <g filter="url(#goldGlowC)">
      <line x1="90" y1="58" x2="90" y2="74" stroke="#cc9900" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="90" cy="75" r="3.5" fill="#ffcc00" stroke="#996600" stroke-width="1"/>
    </g>
    <!-- Stars/sparkles for win -->
    <g filter="url(#jackpotGlow)">
      <text x="9"  y="58" font-size="6" fill="#ffcc00">★</text>
      <text x="83" y="58" font-size="6" fill="#ffcc00">★</text>
      <text x="10" y="95" font-size="5" fill="#ffcc00">✦</text>
      <text x="82" y="95" font-size="5" fill="#ffcc00">✦</text>
    </g>
    <!-- Coins falling -->
    <g fill="#ffcc00" opacity="0.7">
      <ellipse cx="20" cy="93" rx="3.5" ry="2.5"/>
      <ellipse cx="30" cy="96" rx="3.5" ry="2.5"/>
      <ellipse cx="55" cy="94" rx="3.5" ry="2.5"/>
      <ellipse cx="68" cy="96" rx="3.5" ry="2.5"/>
      <ellipse cx="80" cy="93" rx="3.5" ry="2.5"/>
    </g>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#eebb30" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>