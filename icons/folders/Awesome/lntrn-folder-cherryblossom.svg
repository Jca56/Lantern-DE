<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#8a3060"/><stop offset="0.4" stop-color="#5a1840"/><stop offset="1" stop-color="#1a0a18"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(160, 60, 110);"/><stop offset="0.35" style="stop-color: rgb(110, 35, 75);"/><stop offset="1" stop-color="#3a0e28"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ffe0f0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ff88bb" stop-opacity="0.7"/><stop offset="1" stop-color="#8a3060" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="skyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a18"/><stop offset="100%" stop-color="#0d0510"/>
    </linearGradient>
    <filter id="petalGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff88cc" flood-opacity="0.8"/>
    </filter>
    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffeecc" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff88bb"/><stop offset="100%" stop-color="#cc4488"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#skyG)"/>
    <g filter="url(#moonGlow)">
      <circle cx="75" cy="58" r="9" fill="#fff8ee"/>
      <circle cx="79" cy="55" r="7" fill="#0d0510"/>
    </g>
    <!-- Branch -->
    <path d="M7,98 Q20,80 30,70 Q38,62 50,58" fill="none" stroke="#3a1a28" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M30,70 Q35,60 32,52" fill="none" stroke="#3a1a28" stroke-width="2" stroke-linecap="round"/>
    <path d="M40,64 Q48,56 46,50" fill="none" stroke="#3a1a28" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Blossoms on branch -->
    <g filter="url(#petalGlow)">
      <circle cx="32" cy="52" r="4" fill="#ff99cc" opacity="0.9"/>
      <circle cx="30" cy="50" r="2.5" fill="#ffbbdd"/>
      <circle cx="34" cy="50" r="2.5" fill="#ff88bb"/>
      <circle cx="31" cy="54" r="2"   fill="#ffbbdd"/>
      <circle cx="35" cy="53" r="2"   fill="#ff99cc"/>
      <circle cx="46" cy="50" r="3.5" fill="#ff99cc" opacity="0.9"/>
      <circle cx="44" cy="49" r="2.2" fill="#ffbbdd"/>
      <circle cx="48" cy="49" r="2.2" fill="#ff88bb"/>
      <circle cx="50" cy="58" r="3"   fill="#ff99cc" opacity="0.8"/>
    </g>
    <!-- Falling petals -->
    <g filter="url(#petalGlow)" opacity="0.8">
      <ellipse cx="20" cy="65" rx="2.5" ry="1.5" fill="#ffaad4" transform="rotate(-30,20,65)"/>
      <ellipse cx="55" cy="62" rx="2"   ry="1.2" fill="#ffbbdd" transform="rotate(20,55,62)"/>
      <ellipse cx="65" cy="72" rx="2.5" ry="1.5" fill="#ff99cc" transform="rotate(-15,65,72)"/>
      <ellipse cx="40" cy="80" rx="2"   ry="1.2" fill="#ffaad4" transform="rotate(40,40,80)"/>
      <ellipse cx="78" cy="78" rx="2.5" ry="1.5" fill="#ffbbdd" transform="rotate(-25,78,78)"/>
      <ellipse cx="18" cy="85" rx="2"   ry="1.2" fill="#ff99cc" transform="rotate(15,18,85)"/>
      <ellipse cx="60" cy="88" rx="2.5" ry="1.5" fill="#ffaad4" transform="rotate(-10,60,88)"/>
      <ellipse cx="85" cy="65" rx="2"   ry="1.2" fill="#ffbbdd" transform="rotate(35,85,65)"/>
    </g>
    <!-- Reflection pond -->
    <ellipse cx="50" cy="96" rx="30" ry="4" fill="#2a0a22" opacity="0.6"/>
    <path d="M30,95 Q40,93 50,95 Q60,97 70,95" fill="none" stroke="#ff88bb" stroke-width="0.8" opacity="0.3"/>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#ff88bb" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>