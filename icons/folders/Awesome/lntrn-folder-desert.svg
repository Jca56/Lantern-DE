<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#804000"/><stop offset="0.4" stop-color="#502800"/><stop offset="1" stop-color="#1a0a00"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(155, 75, 0);"/><stop offset="0.35" style="stop-color: rgb(105, 48, 0);"/><stop offset="1" stop-color="#301800"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ffe8c0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ee8830" stop-opacity="0.7"/><stop offset="1" stop-color="#804000" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="desertSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0520"/><stop offset="30%" stop-color="#8a1a00"/><stop offset="60%" stop-color="#dd5500"/><stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <radialGradient id="sunDesert" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ffee44"/><stop offset="40%" stop-color="#ff8800"/><stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sandG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#331500"/><stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <filter id="sunGlowD" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff8800" flood-opacity="0.9"/>
    </filter>
    <filter id="cactiGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#004400" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#ffaa00"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#desertSky)"/>
    <!-- Sun glow at horizon -->
    <g filter="url(#sunGlowD)">
      <ellipse cx="50" cy="80" rx="22" ry="10" fill="url(#sunDesert)" opacity="0.8"/>
      <ellipse cx="50" cy="80" rx="8" ry="4" fill="#ffee44" opacity="0.6"/>
    </g>
    <!-- Horizon rays -->
    <g opacity="0.25" stroke="#ff8800" stroke-width="0.8">
      <line x1="50" y1="80" x2="20" y2="55"/>
      <line x1="50" y1="80" x2="30" y2="50"/>
      <line x1="50" y1="80" x2="42" y2="48"/>
      <line x1="50" y1="80" x2="58" y2="48"/>
      <line x1="50" y1="80" x2="70" y2="50"/>
      <line x1="50" y1="80" x2="80" y2="55"/>
    </g>
    <!-- Sand dunes -->
    <path d="M7,80 Q25,72 40,78 Q55,84 70,76 Q82,70 93,78 L93,98 L7,98 Z" fill="url(#sandG)"/>
    <path d="M7,84 Q20,78 35,82 Q50,86 65,80 Q78,75 93,82 L93,98 L7,98 Z" fill="#2a1000" opacity="0.8"/>
    <!-- Cacti -->
    <g filter="url(#cactiGlow)">
      <!-- Left cactus -->
      <rect x="18" y="65" width="4" height="18" rx="2" fill="#1a4a00"/>
      <rect x="12" y="70" width="8" height="3.5" rx="2" fill="#1a4a00"/>
      <rect x="12" y="68" width="3" height="5" rx="1.5" fill="#1a4a00"/>
      <!-- Right cactus -->
      <rect x="76" y="62" width="4" height="20" rx="2" fill="#1a4a00"/>
      <rect x="72" y="67" width="10" height="3.5" rx="2" fill="#1a4a00"/>
      <rect x="79" y="65" width="3" height="6" rx="1.5" fill="#1a4a00"/>
      <!-- Small cactus -->
      <rect x="58" y="74" width="3" height="10" rx="1.5" fill="#1a4a00"/>
      <rect x="55" y="77" width="6" height="2.5" rx="1.5" fill="#1a4a00"/>
    </g>
    <!-- Stars appearing -->
    <circle cx="25" cy="52" r="0.8" fill="#ffeecc" opacity="0.7"/>
    <circle cx="65" cy="51" r="1"   fill="#ffeecc" opacity="0.6"/>
    <circle cx="82" cy="54" r="0.8" fill="#ffeecc" opacity="0.5"/>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#ee8830" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>