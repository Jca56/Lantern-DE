<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#0a3018"/><stop offset="0.4" stop-color="#062010"/><stop offset="1" stop-color="#021008"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(12, 60, 30);"/><stop offset="0.35" style="stop-color: rgb(6, 40, 18);"/><stop offset="1" stop-color="#021a0a"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#d0ffe0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#55dd88" stop-opacity="0.7"/><stop offset="1" stop-color="#0a3018" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="forestBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#03100a"/><stop offset="100%" stop-color="#010805"/>
    </linearGradient>
    <radialGradient id="shroomR" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff4444"/><stop offset="100%" stop-color="#880000"/>
    </radialGradient>
    <filter id="magicGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#44ff88" flood-opacity="0.9"/>
    </filter>
    <filter id="shroomGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff4444" flood-opacity="0.8"/>
    </filter>
    <filter id="firefly" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffaa" flood-opacity="1"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#44ff88"/><stop offset="100%" stop-color="#aa44ff"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#forestBack)"/>
    <!-- Tree trunks background -->
    <rect x="12" y="48" width="5" height="50" rx="2" fill="#0d1a0a" opacity="0.8"/>
    <rect x="28" y="48" width="4" height="50" rx="2" fill="#0a1408" opacity="0.7"/>
    <rect x="60" y="48" width="5" height="50" rx="2" fill="#0d1a0a" opacity="0.8"/>
    <rect x="78" y="48" width="4" height="50" rx="2" fill="#0a1408" opacity="0.7"/>
    <!-- Glowing ground -->
    <g filter="url(#magicGlow)" opacity="0.4">
      <ellipse cx="50" cy="96" rx="40" ry="4" fill="#33ff88"/>
    </g>
    <!-- Mushrooms -->
    <g filter="url(#shroomGlow)">
      <!-- Big center mushroom -->
      <ellipse cx="50" cy="74" rx="12" ry="7" fill="url(#shroomR)"/>
      <ellipse cx="46" cy="72" rx="4" ry="2.5" fill="#ff8888" opacity="0.5"/>
      <circle cx="48" cy="73" r="1.5" fill="#fff" opacity="0.8"/>
      <circle cx="54" cy="71" r="1.2" fill="#fff" opacity="0.7"/>
      <circle cx="44" cy="75" r="1"   fill="#fff" opacity="0.6"/>
      <rect x="48" y="74" width="4" height="10" rx="2" fill="#f0ece0"/>
      <!-- Left mushroom -->
      <ellipse cx="30" cy="82" rx="7" ry="4.5" fill="#cc2222"/>
      <circle cx="28" cy="81" r="1" fill="#fff" opacity="0.8"/>
      <circle cx="32" cy="80" r="1" fill="#fff" opacity="0.7"/>
      <rect x="28.5" y="82" width="3" height="7" rx="1.5" fill="#e8e4d8"/>
      <!-- Right small mushroom -->
      <ellipse cx="70" cy="85" rx="5" ry="3.5" fill="#aa1111"/>
      <circle cx="69" cy="84" r="0.8" fill="#fff" opacity="0.7"/>
      <rect x="69" y="85" width="2.5" height="5" rx="1" fill="#e8e4d8"/>
    </g>
    <!-- Fairy ring of dots -->
    <g filter="url(#magicGlow)">
      <circle cx="38" cy="92" r="1.2" fill="#44ff88" opacity="0.9"/>
      <circle cx="42" cy="94" r="1"   fill="#66ffaa" opacity="0.8"/>
      <circle cx="50" cy="96" r="1.2" fill="#44ff88" opacity="0.9"/>
      <circle cx="58" cy="94" r="1"   fill="#66ffaa" opacity="0.8"/>
      <circle cx="63" cy="91" r="1.2" fill="#44ff88" opacity="0.9"/>
    </g>
    <!-- Fireflies -->
    <g filter="url(#firefly)">
      <circle cx="20" cy="62" r="1.2" fill="#ffffaa"/>
      <circle cx="72" cy="60" r="1"   fill="#ffffcc"/>
      <circle cx="85" cy="68" r="1.2" fill="#ffffaa"/>
      <circle cx="38" cy="58" r="1"   fill="#ffffcc"/>
      <circle cx="65" cy="72" r="1.2" fill="#ffffaa"/>
      <circle cx="15" cy="78" r="1"   fill="#ffffcc"/>
    </g>
    <!-- Fern leaves -->
    <g fill="none" stroke="#1a5a2a" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
      <path d="M7,90 Q12,84 10,78"/>
      <path d="M10,87 Q8,82 12,79"/>
      <path d="M88,88 Q84,82 86,76"/>
      <path d="M85,85 Q88,80 84,77"/>
    </g>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#55dd88" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>