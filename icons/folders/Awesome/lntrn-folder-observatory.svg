<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#1a1a50"/><stop offset="0.4" stop-color="#0e0e30"/><stop offset="1" stop-color="#040410"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(30, 30, 95);"/><stop offset="0.35" style="stop-color: rgb(18, 18, 62);"/><stop offset="1" stop-color="#0a0a28"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#d8d8ff" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#8888ee" stop-opacity="0.7"/><stop offset="1" stop-color="#1a1a50" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="obsBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02040f"/><stop offset="100%" stop-color="#010208"/>
    </linearGradient>
    <linearGradient id="domeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3a5a"/><stop offset="100%" stop-color="#111a2a"/>
    </linearGradient>
    <filter id="starG" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#fff" flood-opacity="1"/>
    </filter>
    <filter id="scopeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#aaaaff" flood-opacity="0.8"/>
    </filter>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.7"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#aaaaff"/><stop offset="100%" stop-color="#4444cc"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#obsBack)"/>
    <!-- Constellation lines -->
    <g stroke="#334466" stroke-width="0.7" opacity="0.6">
      <line x1="15" y1="52" x2="25" y2="58"/><line x1="25" y1="58" x2="20" y2="66"/>
      <line x1="25" y1="58" x2="35" y2="62"/><line x1="70" y1="50" x2="80" y2="56"/>
      <line x1="80" y1="56" x2="88" y2="52"/><line x1="80" y1="56" x2="76" y2="64"/>
    </g>
    <!-- Stars -->
    <g filter="url(#starG)">
      <circle cx="15" cy="52" r="1"   fill="#fff"/>
      <circle cx="25" cy="58" r="1.5" fill="#fff"/>
      <circle cx="20" cy="66" r="1"   fill="#aaaaff"/>
      <circle cx="35" cy="62" r="1"   fill="#aaaaff"/>
      <circle cx="70" cy="50" r="1.2" fill="#fff"/>
      <circle cx="80" cy="56" r="1.5" fill="#fff"/>
      <circle cx="88" cy="52" r="1"   fill="#aaaaff"/>
      <circle cx="76" cy="64" r="1"   fill="#aaaaff"/>
      <circle cx="55" cy="52" r="0.8" fill="#fff" opacity="0.7"/>
      <circle cx="45" cy="60" r="0.8" fill="#fff" opacity="0.6"/>
      <circle cx="60" cy="64" r="0.8" fill="#fff" opacity="0.7"/>
    </g>
    <!-- Observatory dome building -->
    <g filter="url(#scopeGlow)">
      <rect x="28" y="80" width="44" height="18" rx="2" fill="url(#domeG)" stroke="#4444aa" stroke-width="1"/>
      <path d="M28,80 A22,22 0 0,1 72,80 Z" fill="url(#domeG)" stroke="#4444aa" stroke-width="1"/>
      <!-- Dome slit -->
      <rect x="48" y="62" width="4" height="18" rx="1" fill="#000010"/>
      <!-- Windows -->
      <rect x="33" y="84" width="6" height="5" rx="1" fill="#000828" stroke="#6666aa" stroke-width="0.8"/>
      <rect x="42" y="84" width="6" height="5" rx="1" fill="#000828" stroke="#6666aa" stroke-width="0.8"/>
      <rect x="58" y="84" width="6" height="5" rx="1" fill="#000828" stroke="#6666aa" stroke-width="0.8"/>
    </g>
    <!-- Telescope beam -->
    <g filter="url(#beamGlow)" opacity="0.6">
      <line x1="50" y1="68" x2="30" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Planet being observed -->
    <g filter="url(#starG)">
      <circle cx="30" cy="50" r="4" fill="#332255" stroke="#8866ff" stroke-width="1"/>
      <ellipse cx="30" cy="50" rx="6.5" ry="1.8" fill="none" stroke="#aa88ff" stroke-width="1" opacity="0.8"/>
    </g>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#8888ee" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

