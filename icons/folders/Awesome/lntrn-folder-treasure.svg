<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#6a4a0a"/><stop offset="0.4" stop-color="#402c05"/><stop offset="1" stop-color="#1a1205"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(130, 90, 15);"/><stop offset="0.35" style="stop-color: rgb(88, 60, 8);"/><stop offset="1" stop-color="#2a1c04"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff0d0" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#d4a020" stop-opacity="0.7"/><stop offset="1" stop-color="#6a4a0a" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f0a"/><stop offset="100%" stop-color="#1a1205"/>
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffaa00" flood-opacity="0.9"/>
    </filter>
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff2200" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c8860a"/><stop offset="100%" stop-color="#7a4a00"/></linearGradient>
    <clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip at fold line -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  
  <!-- Theme scene -->
  <g clip-path="url(#frontClip)">
    <g transform="translate(22, 98) scale(2.5116, 2.9200) translate(-7, -48)">
      
    <rect x="7" y="48" width="86" height="50" fill="url(#parchment)"/>
    <!-- Map texture lines -->
    <g stroke="#3a2a0a" stroke-width="0.6" opacity="0.5">
      <line x1="7" y1="55" x2="93" y2="55"/>
      <line x1="7" y1="62" x2="93" y2="62"/>
      <line x1="7" y1="69" x2="93" y2="69"/>
      <line x1="7" y1="76" x2="93" y2="76"/>
      <line x1="7" y1="83" x2="93" y2="83"/>
      <line x1="7" y1="90" x2="93" y2="90"/>
    </g>
    <!-- Coastline shape -->
    <g filter="url(#goldGlow)">
      <path d="M15,55 Q20,58 18,65 Q16,72 22,75 Q28,78 25,85 Q22,90 28,95 L15,95 Z"
            fill="#c8860a" opacity="0.25" stroke="#c8860a" stroke-width="1.2"/>
      <path d="M35,55 Q50,52 60,56 Q68,60 65,68 Q62,76 70,78 Q78,80 75,90 Q72,96 80,98 L35,98 Z"
            fill="#c8860a" opacity="0.2" stroke="#c8860a" stroke-width="1"/>
    </g>
    <!-- Compass rose -->
    <g filter="url(#goldGlow)">
      <circle cx="78" cy="62" r="8" fill="none" stroke="#c8860a" stroke-width="1"/>
      <line x1="78" y1="54" x2="78" y2="70" stroke="#c8860a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="70" y1="62" x2="86" y2="62" stroke="#c8860a" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="78,54 76,59 78,58 80,59" fill="#ffcc44"/>
      <text x="76" y="53" font-family="serif" font-size="4" fill="#ffcc44">N</text>
    </g>
    <!-- X marks the spot -->
    <g filter="url(#redGlow)">
      <line x1="44" y1="72" x2="54" y2="82" stroke="#ff3300" stroke-width="3" stroke-linecap="round"/>
      <line x1="54" y1="72" x2="44" y2="82" stroke="#ff3300" stroke-width="3" stroke-linecap="round"/>
      <circle cx="49" cy="77" r="6" fill="none" stroke="#ff3300" stroke-width="1.2" opacity="0.5"/>
    </g>
    <!-- Dotted trail -->
    <path d="M20,80 Q30,70 42,74" fill="none" stroke="#c8860a" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.6"/>
  
    </g>
  </g>
  
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#d4a020" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

