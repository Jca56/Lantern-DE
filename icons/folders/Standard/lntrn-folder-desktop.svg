      <circle cx="80" cy="189" r="2.5" fill="#4488cc" opacity="0.7"/>
      <circle cx="90" cy="189" r="2.5" fill="#44aa66" opacity="0.6"/>
      <circle cx="100" cy="189" r="2.5" fill="#cc8844" opacity="0.6"/>
    </g>
    <!-- Monitor chin -->
    <rect x="120" y="205" width="20" height="12" rx="2" fill="#1a1a2e"/>
    <ellipse cx="130" cy="220" rx="30" ry="5" fill="#1a1a2e"/>
