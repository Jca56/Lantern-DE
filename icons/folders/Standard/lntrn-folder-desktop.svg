    <rect x="80" y="224" width="100" height="14" rx="3" fill="#1a1a28" stroke="#334" stroke-width="1"/>
    <g fill="#2a2a3e" opacity="0.6">
      <rect x="86" y="227" width="6" height="3" rx="1"/><rect x="95" y="227" width="6" height="3" rx="1"/>
      <rect x="104" y="227" width="6" height="3" rx="1"/><rect x="113" y="227" width="6" height="3" rx="1"/>
      <rect x="122" y="227" width="6" height="3" rx="1"/><rect x="131" y="227" width="6" height="3" rx="1"/>
      <rect x="140" y="227" width="6" height="3" rx="1"/><rect x="149" y="227" width="6" height="3" rx="1"/>
      <rect x="158" y="227" width="6" height="3" rx="1"/><rect x="167" y="227" width="6" height="3" rx="1"/>
      <rect x="95" y="233" width="6" height="3" rx="1"/><rect x="104" y="233" width="6" height="3" rx="1"/>
      <rect x="113" y="233" width="30" height="3" rx="1"/><rect x="149" y="233" width="6" height="3" rx="1"/>
      <rect x="158" y="233" width="6" height="3" rx="1"/>
    </g>

