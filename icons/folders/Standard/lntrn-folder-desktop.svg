    <!-- Wallpaper aurora effect -->
    <ellipse cx="130" cy="140" rx="90" ry="30" fill="#2255aa" opacity="0.3"/>
    <ellipse cx="130" cy="145" rx="60" ry="20" fill="#4488cc" opacity="0.2"/>
    <!-- Monitor -->
    <g filter="url(#monGlow)">
      <rect x="60" y="115" width="140" height="90" rx="6" fill="#1a1a2e" stroke="#4488cc" stroke-width="2"/>
      <!-- Screen -->
      <rect x="68" y="121" width="124" height="72" rx="3" fill="#0d1828"/>
      <!-- Desktop wallpaper gradient -->
      <rect x="68" y="121" width="124" height="30" rx="3" fill="#1a3a60" opacity="0.8"/>
      <rect x="68" y="121" width="124" height="15" rx="3" fill="#2a5580" opacity="0.5"/>
      <!-- Desktop icons grid -->
