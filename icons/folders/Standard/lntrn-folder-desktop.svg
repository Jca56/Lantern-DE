      <rect x="76" y="162" width="10" height="10" rx="2" fill="#3a6090" opacity="0.4"/>
      <rect x="92" y="130" width="10" height="10" rx="2" fill="#4a8ab0" opacity="0.5"/>
      <!-- Terminal window -->
