        <rect x="110" y="138" width="74" height="48" rx="3" fill="#0a1420" stroke="#00ccff" stroke-width="1" opacity="0.9"/>
        <rect x="110" y="138" width="74" height="8" rx="3" fill="#1a2838"/>
        <circle cx="116" cy="142" r="2" fill="#ff4444" opacity="0.8"/>
        <circle cx="122" cy="142" r="2" fill="#ffcc00" opacity="0.8"/>
        <circle cx="128" cy="142" r="2" fill="#44cc44" opacity="0.8"/>
        <!-- Terminal text -->
        <rect x="114" y="150" width="40" height="2" rx="1" fill="#00ccff" opacity="0.6"/>
        <rect x="114" y="156" width="55" height="2" rx="1" fill="#44ffaa" opacity="0.5"/>
        <rect x="114" y="162" width="30" height="2" rx="1" fill="#00ccff" opacity="0.4"/>
        <rect x="114" y="168" width="45" height="2" rx="1" fill="#44ffaa" opacity="0.4"/>
        <rect x="114" y="174" width="8" height="2" rx="1" fill="#00ccff" opacity="0.8"/>
      </g>
      <!-- Taskbar -->
