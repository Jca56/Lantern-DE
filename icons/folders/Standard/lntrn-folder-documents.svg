<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#6a4020"/><stop offset="0.4" stop-color="#402810"/><stop offset="1" stop-color="#1a1008"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(128, 78, 35);"/><stop offset="0.35" style="stop-color: rgb(85, 50, 20);"/><stop offset="1" stop-color="#2a1808"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff0d8" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#cc9050" stop-opacity="0.7"/><stop offset="1" stop-color="#6a4020" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#cc8833"/><stop offset="100%" stop-color="#aa6622"/></linearGradient>
    <linearGradient id="parchBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2a1a08"/><stop offset="100%" stop-color="#1a0e04"/></linearGradient>
    <filter id="docGlow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#cc8833" flood-opacity="0.7"/></filter>
    <filter id="sealGlow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#cc2222" flood-opacity="0.8"/></filter>
    
<clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  <!-- Scene -->
  <g clip-path="url(#frontClip)">
    
    <rect x="22" y="98" width="216" height="146" fill="url(#parchBg)"/>
    <!-- Scattered papers background -->
    <g transform="rotate(8, 180, 160)" opacity="0.5">
      <rect x="150" y="110" width="80" height="100" rx="3" fill="#3a2810" stroke="#5a3a10" stroke-width="1"/>
    </g>
    <g transform="rotate(-5, 70, 170)" opacity="0.4">
      <rect x="40" y="120" width="70" height="90" rx="3" fill="#3a2810" stroke="#5a3a10" stroke-width="1"/>
    </g>
    <!-- Main document -->
    <g filter="url(#docGlow)">
      <rect x="72" y="112" width="116" height="118" rx="4" fill="#f5efe0" stroke="#c8b898" stroke-width="1.5"/>
      <!-- Header area -->
      <rect x="82" y="120" width="60" height="5" rx="2" fill="#4a3020" opacity="0.6"/>
      <rect x="82" y="129" width="96" height="1.5" rx="1" fill="#000" opacity="0.08"/>
      <!-- Text lines -->
      <rect x="82" y="138" width="96" height="3" rx="1" fill="#8a7a60" opacity="0.4"/>
      <rect x="82" y="146" width="88" height="3" rx="1" fill="#8a7a60" opacity="0.35"/>
      <rect x="82" y="154" width="92" height="3" rx="1" fill="#8a7a60" opacity="0.3"/>
      <rect x="82" y="162" width="70" height="3" rx="1" fill="#8a7a60" opacity="0.3"/>
      <rect x="82" y="174" width="96" height="3" rx="1" fill="#8a7a60" opacity="0.3"/>
      <rect x="82" y="182" width="80" height="3" rx="1" fill="#8a7a60" opacity="0.25"/>
      <rect x="82" y="190" width="90" height="3" rx="1" fill="#8a7a60" opacity="0.25"/>
      <rect x="82" y="198" width="60" height="3" rx="1" fill="#8a7a60" opacity="0.2"/>
      <!-- Wax seal -->
      <g filter="url(#sealGlow)">
        <circle cx="150" cy="212" r="10" fill="#cc2222"/>
        <circle cx="150" cy="212" r="8" fill="#ee3333"/>
        <circle cx="150" cy="212" r="5" fill="#cc2222" opacity="0.6"/>
        <circle cx="150" cy="210" r="3" fill="#ee4444" opacity="0.4"/>
      </g>
    </g>
    <!-- Colored tabs sticking out -->
    <rect x="190" y="118" width="16" height="10" rx="2" fill="#cc3333" opacity="0.8"/>
    <rect x="190" y="136" width="16" height="10" rx="2" fill="#33aa55" opacity="0.7"/>
    <rect x="190" y="154" width="16" height="10" rx="2" fill="#3377cc" opacity="0.7"/>
    <!-- Pen -->
    <g transform="rotate(-40, 55, 200)">
      <rect x="35" y="140" width="5" height="50" rx="2" fill="#2c3e50"/>
      <rect x="35" y="140" width="5" height="10" rx="2" fill="#c8a84e"/>
      <polygon points="35,190 40,190 37.5,198" fill="#6a5030"/>
    </g>

  </g>
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#cc9050" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>