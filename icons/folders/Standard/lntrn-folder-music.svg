<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#4a1060"/><stop offset="0.4" stop-color="#2e0840"/><stop offset="1" stop-color="#140420"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(90, 20, 115);"/><stop offset="0.35" style="stop-color: rgb(58, 12, 78);"/><stop offset="1" stop-color="#1e0830"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f0d0ff" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#aa55dd" stop-opacity="0.7"/><stop offset="1" stop-color="#4a1060" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#aa44ff"/><stop offset="100%" stop-color="#6622aa"/></linearGradient>
    <linearGradient id="musicBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#180828"/><stop offset="100%" stop-color="#0a0414"/></linearGradient>
    <filter id="vinylGlow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#aa44ff" flood-opacity="0.7"/></filter>
    <filter id="noteGlow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff44aa" flood-opacity="0.8"/></filter>
    
<clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
