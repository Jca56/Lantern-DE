      <rect x="40" y="226" width="6" height="12" rx="1" fill="#aa44ff"/><rect x="50" y="220" width="6" height="18" rx="1" fill="#cc44ee"/>
      <rect x="60" y="210" width="6" height="28" rx="1" fill="#ff44aa"/><rect x="70" y="216" width="6" height="22" rx="1" fill="#ff6644"/>
      <rect x="80" y="222" width="6" height="16" rx="1" fill="#ffaa44"/><rect x="90" y="212" width="6" height="26" rx="1" fill="#ff44aa"/>
      <rect x="160" y="218" width="6" height="20" rx="1" fill="#aa44ff"/><rect x="170" y="210" width="6" height="28" rx="1" fill="#cc44ee"/>
      <rect x="180" y="224" width="6" height="14" rx="1" fill="#ff44aa"/><rect x="190" y="214" width="6" height="24" rx="1" fill="#ff6644"/>
      <rect x="200" y="220" width="6" height="18" rx="1" fill="#ffaa44"/>
    </g>

  </g>
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#aa55dd" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

