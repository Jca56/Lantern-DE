        <ellipse cx="-5" cy="1" rx="6" ry="5" fill="#44ff88" transform="rotate(-15, -5, 1)"/>
      </g>
      <g transform="translate(65, 165)" opacity="0.5">
        <line x1="0" y1="0" x2="0" y2="-16" stroke="#ffaa44" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="-4" cy="1" rx="5" ry="4" fill="#ffaa44" transform="rotate(-15, -4, 1)"/>
      </g>
    </g>
    <!-- Equalizer bars at bottom -->
