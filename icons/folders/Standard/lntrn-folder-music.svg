      <circle cx="120" cy="180" r="48" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
      <circle cx="120" cy="180" r="42" fill="none" stroke="#252525" stroke-width="0.5"/>
      <circle cx="120" cy="180" r="36" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
      <circle cx="120" cy="180" r="30" fill="none" stroke="#222" stroke-width="0.5"/>
      <circle cx="120" cy="180" r="44" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="2 5"/>
      <circle cx="120" cy="180" r="38" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="3 6"/>
      <!-- Label -->
      <circle cx="120" cy="180" r="18" fill="#9b59b6"/>
      <circle cx="120" cy="180" r="15" fill="#7d3c98"/>
      <circle cx="120" cy="180" r="18" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
      <circle cx="120" cy="180" r="4" fill="#1a1a1a"/>
      <circle cx="120" cy="180" r="2.5" fill="#333"/>
      <rect x="110" y="175" width="20" height="3" rx="1" fill="#f1c40f" opacity="0.6"/>
      <rect x="112" y="180" width="16" height="2" rx="1" fill="#fff" opacity="0.3"/>
      <!-- Shine -->
      <path d="M95,155 Q120,148 145,155 Q135,145 105,145 Z" fill="#fff" opacity="0.04"/>
    </g>
    <!-- Floating notes -->
    <g filter="url(#noteGlow)">
      <g transform="translate(180, 130)">
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#ff44aa" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="-5" cy="1" rx="7" ry="5" fill="#ff44aa" transform="rotate(-15, -5, 1)"/>
      </g>
      <g transform="translate(200, 150)" opacity="0.7">
        <line x1="0" y1="0" x2="0" y2="-18" stroke="#44aaff" stroke-width="2.5" stroke-linecap="round"/>
