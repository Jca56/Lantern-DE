<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="21.044 43.62 217.747 200.581" xmlns:bx="https://boxy-svg.com" preserveAspectRatio="none"><defs><linearGradient id="folderBack" x1="0%" y1="0%" x2="15%" y2="100%"><stop offset="0" stop-color="#1a2a40"/><stop offset="0.4" stop-color="#0e1a2a"/><stop offset="1" stop-color="#050e18"/></linearGradient><linearGradient id="folderFront" x1="0%" y1="0%" x2="5%" y2="100%"><stop offset="0" style="stop-color: rgb(30, 50, 78);"/><stop offset="0.35" style="stop-color: rgb(18, 32, 52);"/><stop offset="1" stop-color="#0a1420"/></linearGradient><linearGradient id="folderFrontHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#d0e0f8" stop-opacity="0.45"/><stop offset="0.15" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="tabHighlight" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#5588bb" stop-opacity="0.7"/><stop offset="1" stop-color="#1a2a40" stop-opacity="0"/></linearGradient><linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#f2f0ea"/><stop offset="1" stop-color="#ddd9cc"/></linearGradient><linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#ccc9bf"/><stop offset="1" stop-color="#b8b4a8"/></linearGradient><linearGradient id="pageEdge" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0" stop-color="#000" stop-opacity="0.25"/><stop offset="0.12" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="fShadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter><filter id="pShadow" x="-5%" y="-15%" width="115%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/></filter>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5588bb"/><stop offset="100%" stop-color="#334466"/></linearGradient>
    <filter id="codeGlow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#5588bb" flood-opacity="0.5"/></filter>
    <filter id="gearGlow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3498db" flood-opacity="0.7"/></filter>
    
<clipPath id="frontClip"><path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z"/></clipPath>
  </defs><g filter="url(#fShadow)" style=""><path d="M22,60 Q22,44 32,44 L102,44 Q112,44 118,56 L134,78 L234,78 Q238,78 238,82 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="url(#folderBack)"/><line x1="30" y1="100" x2="230" y2="100" stroke="#000" stroke-opacity="0.06" stroke-width="0.5" style=""/><line x1="30" y1="140" x2="230" y2="140" stroke="#000" stroke-opacity="0.04" stroke-width="0.5" style=""/><line x1="30" y1="180" x2="230" y2="180" stroke="#000" stroke-opacity="0.03" stroke-width="0.5" style=""/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -1.701021, 0.340202)" style=""><rect x="38" y="56" width="184" height="22" rx="2" ry="2" fill="url(#page2grad)"/><line x1="58" y1="63" x2="170" y2="63" stroke="#a8a498" stroke-width="1" stroke-opacity="0.5"/><line x1="58" y1="69" x2="145" y2="69" stroke="#a8a498" stroke-width="1" stroke-opacity="0.35"/></g><g filter="url(#pShadow)" transform="matrix(1, 0, 0, 1, -0.1701, 3.402037)" style=""><rect x="28" y="68" width="200" height="26" rx="2" ry="2" fill="url(#page1grad)"/><rect x="28" y="68" width="200" height="4" rx="2" ry="2" fill="url(#pageEdge)"/><line x1="48" y1="76" x2="185" y2="76" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.6"/><line x1="48" y1="82" x2="160" y2="82" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.45"/><line x1="48" y1="88" x2="120" y2="88" stroke="#b0ad9f" stroke-width="1.2" stroke-opacity="0.3"/><path d="M216,68 L228,68 L228,80 Z" fill="#c8c4b4" opacity="0.5"/><path d="M216,68 L228,80 L216,80 Z" fill="#e8e4d8" opacity="0.6"/></g>
  <!-- Colored strip -->
  <rect x="22" y="98" width="216" height="28" fill="url(#stripG)"/>
  <rect x="22" y="98" width="216" height="10" fill="#fff" opacity="0.12"/>
  <!-- Scene -->
  <g clip-path="url(#frontClip)">
    
    <rect x="22" y="98" width="216" height="146" fill="#0d1520"/>
    <!-- Editor window -->
    <g filter="url(#codeGlow)">
      <rect x="38" y="112" width="184" height="116" rx="6" fill="#1e1e2e" stroke="#3a3a5a" stroke-width="1.5"/>
      <!-- Title bar -->
      <rect x="38" y="112" width="184" height="18" rx="6" fill="#2d2d3d"/>
      <rect x="38" y="124" width="184" height="6" fill="#2d2d3d"/>
      <!-- Traffic lights -->
      <circle cx="52" cy="121" r="4" fill="#e74c3c"/><circle cx="64" cy="121" r="4" fill="#f39c12"/><circle cx="76" cy="121" r="4" fill="#2ecc71"/>
      <!-- File tabs -->
      <rect x="100" y="115" width="40" height="12" rx="2" fill="#1e1e2e"/><rect x="142" y="115" width="40" height="12" rx="2" fill="#252535" opacity="0.6"/>
      <rect x="104" y="118" width="28" height="3" rx="1" fill="#61afef" opacity="0.5"/>
      <!-- Line numbers gutter -->
      <rect x="38" y="130" width="18" height="98" fill="#16162a"/>
      <text x="42" y="144" font-size="7" fill="#555" font-family="monospace">1</text>
      <text x="42" y="156" font-size="7" fill="#555" font-family="monospace">2</text>
      <text x="42" y="168" font-size="7" fill="#555" font-family="monospace">3</text>
      <text x="42" y="180" font-size="7" fill="#555" font-family="monospace">4</text>
      <text x="42" y="192" font-size="7" fill="#555" font-family="monospace">5</text>
      <text x="42" y="204" font-size="7" fill="#555" font-family="monospace">6</text>
      <text x="42" y="216" font-size="7" fill="#555" font-family="monospace">7</text>
      <!-- Syntax highlighted code -->
      <!-- Line 1: keyword + function -->
      <rect x="62" y="137" width="22" height="5" rx="1" fill="#c678dd"/>
      <rect x="88" y="137" width="36" height="5" rx="1" fill="#61afef"/>
      <rect x="128" y="137" width="8" height="5" rx="1" fill="#e5c07b"/>
      <rect x="140" y="137" width="4" height="5" rx="1" fill="#abb2bf" opacity="0.5"/>
      <!-- Line 2: indented -->
      <rect x="72" y="149" width="16" height="5" rx="1" fill="#c678dd"/>
      <rect x="92" y="149" width="48" height="5" rx="1" fill="#98c379"/>
      <!-- Line 3: var + op + num -->
      <rect x="72" y="161" width="28" height="5" rx="1" fill="#e5c07b"/>
      <rect x="104" y="161" width="8" height="5" rx="1" fill="#56b6c2"/>
      <rect x="116" y="161" width="16" height="5" rx="1" fill="#d19a66"/>
      <!-- Line 4: comment -->
      <rect x="72" y="173" width="60" height="5" rx="1" fill="#5c6370"/>
      <!-- Line 5: keyword + type -->
      <rect x="72" y="185" width="20" height="5" rx="1" fill="#c678dd"/>
      <rect x="96" y="185" width="32" height="5" rx="1" fill="#e06c75"/>
      <!-- Line 6: string -->
      <rect x="72" y="197" width="56" height="5" rx="1" fill="#98c379"/>
      <!-- Line 7: closing -->
      <rect x="62" y="209" width="12" height="5" rx="1" fill="#abb2bf" opacity="0.5"/>
    </g>
    <!-- Gear icon -->
    <g filter="url(#gearGlow)" transform="translate(194, 208)">
      <circle cx="0" cy="0" r="16" fill="#2a2a40" stroke="#4a4a6a" stroke-width="1.5"/>
      <rect x="-3" y="-18" width="6" height="6" rx="1.5" fill="#6a6a8a"/>
      <rect x="-3" y="12" width="6" height="6" rx="1.5" fill="#6a6a8a"/>
      <rect x="-18" y="-3" width="6" height="6" rx="1.5" fill="#6a6a8a"/>
      <rect x="12" y="-3" width="6" height="6" rx="1.5" fill="#6a6a8a"/>
      <rect x="9" y="-14" width="6" height="6" rx="1.5" fill="#6a6a8a" transform="rotate(45, 12, -11)"/>
      <rect x="-15" y="8" width="6" height="6" rx="1.5" fill="#6a6a8a" transform="rotate(45, -12, 11)"/>
      <rect x="9" y="8" width="6" height="6" rx="1.5" fill="#6a6a8a" transform="rotate(45, 12, 11)"/>
      <rect x="-15" y="-14" width="6" height="6" rx="1.5" fill="#6a6a8a" transform="rotate(45, -12, -11)"/>
      <circle cx="0" cy="0" r="9" fill="#1e1e2e"/>
      <circle cx="0" cy="0" r="5" fill="#3498db" opacity="0.6"/>
      <circle cx="0" cy="0" r="2.5" fill="#5dade2" opacity="0.8"/>
    </g>

  </g>
  <path d="M22,98 L238,98 L238,232 Q238,244 226,244 L34,244 Q22,244 22,232 Z" fill="none" stroke="#5588bb" stroke-width="1.5" opacity="0.25"/>
  <rect x="22" y="126" width="216" height="20" fill="#fff" opacity="0.03"/>
  <rect x="22" y="230" width="216" height="14" rx="5" fill="#000" opacity="0.15"/>

</svg>