<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="arcBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050010"/><stop offset="100%" stop-color="#020008"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff"/><stop offset="50%" stop-color="#ff4400"/><stop offset="100%" stop-color="#ffff00"/>
    </linearGradient>
    <filter id="neonA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff00ff" flood-opacity="0.9"/>
    </filter>
    <filter id="neonB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#00ffff" flood-opacity="0.9"/>
    </filter>
    <filter id="neonC" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffff00" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z" fill="#050010"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.1"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#020008"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="url(#arcBack)"/>
    <!-- Scanlines -->
    <g opacity="0.08" fill="#fff">
      <rect x="7" y="49" width="86" height="1"/><rect x="7" y="52" width="86" height="1"/>
      <rect x="7" y="55" width="86" height="1"/><rect x="7" y="58" width="86" height="1"/>
      <rect x="7" y="61" width="86" height="1"/><rect x="7" y="64" width="86" height="1"/>
      <rect x="7" y="67" width="86" height="1"/><rect x="7" y="70" width="86" height="1"/>
      <rect x="7" y="73" width="86" height="1"/><rect x="7" y="76" width="86" height="1"/>
      <rect x="7" y="79" width="86" height="1"/><rect x="7" y="82" width="86" height="1"/>
      <rect x="7" y="85" width="86" height="1"/><rect x="7" y="88" width="86" height="1"/>
      <rect x="7" y="91" width="86" height="1"/><rect x="7" y="94" width="86" height="1"/>
    </g>
    <!-- Pixel space invader -->
    <g filter="url(#neonA)">
      <rect x="38" y="52" width="4" height="4" fill="#ff00ff"/>
      <rect x="58" y="52" width="4" height="4" fill="#ff00ff"/>
      <rect x="34" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="38" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="42" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="46" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="50" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="54" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="58" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="62" y="56" width="4" height="4" fill="#ff00ff"/>
      <rect x="30" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="38" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="46" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="50" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="58" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="66" y="60" width="4" height="4" fill="#ff00ff"/>
      <rect x="30" y="64" width="40" height="4" fill="#ff00ff"/>
      <rect x="34" y="68" width="4" height="4" fill="#ff00ff"/>
      <rect x="58" y="68" width="4" height="4" fill="#ff00ff"/>
      <rect x="26" y="68" width="4" height="4" fill="#ff00ff"/>
      <rect x="66" y="68" width="4" height="4" fill="#ff00ff"/>
    </g>
    <!-- Score display -->
    <g filter="url(#neonB)">
      <text x="10" y="57" font-family="monospace" font-size="5" fill="#00ffff">SCORE</text>
      <text x="10" y="64" font-family="monospace" font-size="6" fill="#00ffff">09480</text>
    </g>
    <!-- Lives -->
    <g filter="url(#neonC)">
      <text x="10" y="72" font-family="monospace" font-size="4" fill="#ffff00">LIVES</text>
      <text x="10" y="78" font-family="monospace" font-size="5" fill="#ffff00">♥ ♥ ♥</text>
    </g>
    <!-- Ground bunkers pixel style -->
    <g filter="url(#neonA)" opacity="0.7">
      <rect x="15" y="88" width="12" height="8" rx="1" fill="#ff00ff" opacity="0.3" stroke="#ff00ff" stroke-width="0.8"/>
      <rect x="17" y="93" width="3" height="3" fill="#050010"/>
      <rect x="22" y="93" width="3" height="3" fill="#050010"/>
      <rect x="44" y="88" width="12" height="8" rx="1" fill="#ff00ff" opacity="0.3" stroke="#ff00ff" stroke-width="0.8"/>
      <rect x="46" y="93" width="3" height="3" fill="#050010"/>
      <rect x="51" y="93" width="3" height="3" fill="#050010"/>
      <rect x="73" y="88" width="12" height="8" rx="1" fill="#ff00ff" opacity="0.3" stroke="#ff00ff" stroke-width="0.8"/>
      <rect x="75" y="93" width="3" height="3" fill="#050010"/>
      <rect x="80" y="93" width="3" height="3" fill="#050010"/>
    </g>
    <!-- Missile -->
    <g filter="url(#neonC)">
      <rect x="49" y="78" width="2" height="8" rx="1" fill="#ffff00"/>
    </g>
    <!-- INSERT COIN blink -->
    <g filter="url(#neonB)" opacity="0.8">
      <text x="22" y="86" font-family="monospace" font-size="4" fill="#00ffff">INSERT COIN</text>
    </g>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#ff00ff" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>