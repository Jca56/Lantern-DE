<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="skyBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000d1a"/><stop offset="100%" stop-color="#000508"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffaa"/><stop offset="50%" stop-color="#00aaff"/><stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <filter id="auroraGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#fff" flood-opacity="1"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z"
          fill="#000d1a"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.12"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#000508"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="url(#skyBack)"/>
    <!-- Aurora curtains -->
    <g filter="url(#auroraGlow)" opacity="0.85">
      <path d="M10,50 Q15,58 12,70 Q10,80 14,98" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
      <path d="M22,48 Q28,60 24,72 Q21,83 25,98" fill="none" stroke="#00ddff" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
      <path d="M36,48 Q44,63 38,76 Q34,86 38,98" fill="none" stroke="#00ffcc" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
      <path d="M52,48 Q58,62 54,75 Q51,85 55,98" fill="none" stroke="#aa44ff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
      <path d="M66,50 Q70,62 67,74 Q65,84 68,98" fill="none" stroke="#00aaff" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
      <path d="M78,50 Q83,61 80,73 Q78,83 81,98" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    </g>
    <!-- Stars -->
    <g filter="url(#starGlow)">
      <circle cx="15" cy="52" r="0.8" fill="#fff" opacity="0.9"/>
      <circle cx="33" cy="50" r="1"   fill="#fff" opacity="0.8"/>
      <circle cx="58" cy="51" r="0.8" fill="#fff" opacity="0.9"/>
      <circle cx="72" cy="49" r="1"   fill="#fff" opacity="0.7"/>
      <circle cx="86" cy="53" r="0.8" fill="#fff" opacity="0.8"/>
      <circle cx="44" cy="54" r="0.6" fill="#fff" opacity="0.6"/>
    </g>
    <!-- Snow ground -->
    <path d="M7,88 Q20,84 35,87 Q50,90 65,86 Q78,83 93,87 L93,98 L7,98 Z" fill="#cce8ff" opacity="0.15"/>
    <!-- Pine trees silhouette -->
    <polygon points="18,88 23,72 28,88" fill="#001a0a" opacity="0.8"/>
    <polygon points="75,88 80,70 85,88" fill="#001a0a" opacity="0.8"/>
    <polygon points="70,88 74,75 78,88" fill="#001a0a" opacity="0.7"/>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#00ffaa" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>