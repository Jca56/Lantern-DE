<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="gardenBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0a"/><stop offset="100%" stop-color="#050d05"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff44aa"/><stop offset="50%" stop-color="#ffaa00"/><stop offset="100%" stop-color="#44ff88"/>
    </linearGradient>
    <filter id="flowerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffaaff" flood-opacity="0.7"/>
    </filter>
    <filter id="wingGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff8800" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z" fill="#0a1a0a"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.12"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#050d05"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="url(#gardenBack)"/>
    <!-- Grass -->
    <g stroke="#1a5a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <line x1="10" y1="98" x2="12" y2="88"/><line x1="14" y1="98" x2="13" y2="90"/>
      <line x1="18" y1="98" x2="20" y2="87"/><line x1="75" y1="98" x2="77" y2="88"/>
      <line x1="80" y1="98" x2="79" y2="90"/><line x1="85" y1="98" x2="87" y2="87"/>
      <line x1="88" y1="98" x2="89" y2="91"/><line x1="92" y1="98" x2="91" y2="89"/>
    </g>
    <!-- Flowers -->
    <g filter="url(#flowerGlow)">
      <!-- Pink flower -->
      <circle cx="20" cy="84" r="4" fill="#ff44aa" opacity="0.9"/>
      <circle cx="16" cy="82" r="3" fill="#ff66bb" opacity="0.8"/>
      <circle cx="24" cy="82" r="3" fill="#ff44aa" opacity="0.8"/>
      <circle cx="20" cy="79" r="3" fill="#ff66bb" opacity="0.8"/>
      <circle cx="20" cy="87" r="3" fill="#ff44aa" opacity="0.7"/>
      <circle cx="20" cy="83" r="2" fill="#ffee44"/>
      <line x1="20" y1="87" x2="20" y2="98" stroke="#1a5a1a" stroke-width="1.5"/>
      <!-- Yellow flower -->
      <circle cx="42" cy="80" r="4" fill="#ffcc00" opacity="0.9"/>
      <circle cx="38" cy="78" r="3" fill="#ffdd44" opacity="0.8"/>
      <circle cx="46" cy="78" r="3" fill="#ffcc00" opacity="0.8"/>
      <circle cx="42" cy="75" r="3" fill="#ffdd44" opacity="0.8"/>
      <circle cx="42" cy="83" r="3" fill="#ffcc00" opacity="0.7"/>
      <circle cx="42" cy="79" r="2" fill="#ff8800"/>
      <line x1="42" y1="83" x2="40" y2="98" stroke="#1a5a1a" stroke-width="1.5"/>
      <!-- Purple flower -->
      <circle cx="75" cy="82" r="4" fill="#aa44ff" opacity="0.9"/>
      <circle cx="71" cy="80" r="3" fill="#bb66ff" opacity="0.8"/>
      <circle cx="79" cy="80" r="3" fill="#aa44ff" opacity="0.8"/>
      <circle cx="75" cy="77" r="3" fill="#bb66ff" opacity="0.8"/>
      <circle cx="75" cy="85" r="3" fill="#aa44ff" opacity="0.7"/>
      <circle cx="75" cy="81" r="2" fill="#ffee44"/>
      <line x1="75" y1="85" x2="73" y2="98" stroke="#1a5a1a" stroke-width="1.5"/>
    </g>
    <!-- Butterflies -->
    <g filter="url(#wingGlow)">
      <!-- Center butterfly -->
      <path d="M50,65 Q42,58 40,64 Q42,70 50,67 Z" fill="#ff8800" opacity="0.9"/>
      <path d="M50,65 Q58,58 60,64 Q58,70 50,67 Z" fill="#ff6600" opacity="0.9"/>
      <path d="M50,67 Q44,68 43,73 Q46,74 50,70 Z" fill="#ffaa44" opacity="0.8"/>
      <path d="M50,67 Q56,68 57,73 Q54,74 50,70 Z" fill="#ff8822" opacity="0.8"/>
      <ellipse cx="50" cy="67" rx="1.5" ry="3" fill="#1a0500"/>
      <!-- Small top left butterfly -->
      <path d="M25,58 Q21,54 20,57 Q21,61 25,59 Z" fill="#44aaff" opacity="0.8"/>
      <path d="M25,58 Q29,54 30,57 Q29,61 25,59 Z" fill="#2288dd" opacity="0.8"/>
      <path d="M25,59 Q22,60 22,63 Q24,63 25,61 Z" fill="#66bbff" opacity="0.7"/>
      <path d="M25,59 Q28,60 28,63 Q26,63 25,61 Z" fill="#4499ee" opacity="0.7"/>
      <ellipse cx="25" cy="59" rx="1" ry="2" fill="#0a0a1a"/>
      <!-- Small right butterfly -->
      <path d="M72,55 Q68,51 67,54 Q68,58 72,56 Z" fill="#ff44aa" opacity="0.8"/>
      <path d="M72,55 Q76,51 77,54 Q76,58 72,56 Z" fill="#cc2288" opacity="0.8"/>
      <path d="M72,56 Q69,57 69,60 Q71,60 72,58 Z" fill="#ff88cc" opacity="0.7"/>
      <path d="M72,56 Q75,57 75,60 Q73,60 72,58 Z" fill="#ee44aa" opacity="0.7"/>
      <ellipse cx="72" cy="56" rx="1" ry="2" fill="#1a001a"/>
    </g>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#ff88cc" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>