<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="casinoBack" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/><stop offset="100%" stop-color="#0d0800"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc9900"/><stop offset="50%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <linearGradient id="reelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1800"/><stop offset="100%" stop-color="#1a0f00"/>
    </linearGradient>
    <linearGradient id="sevenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/><stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="goldGlowC" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffcc00" flood-opacity="0.9"/>
    </filter>
    <filter id="sevenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff4444" flood-opacity="1"/>
    </filter>
    <filter id="jackpotGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffcc00" flood-opacity="1"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z" fill="#1a0f00"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.2"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#0d0800"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="url(#casinoBack)"/>
    <!-- Slot machine frame -->
    <g filter="url(#goldGlowC)">
      <rect x="10" y="52" width="80" height="36" rx="4" fill="#1a0f00" stroke="#cc9900" stroke-width="2"/>
      <!-- Reel windows -->
      <rect x="14" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <rect x="40" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <rect x="66" y="56" width="20" height="28" rx="2" fill="url(#reelG)" stroke="#aa8800" stroke-width="1.5"/>
      <!-- Win line -->
      <line x1="10" y1="70" x2="90" y2="70" stroke="#ffcc00" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
    </g>
    <!-- The 7s -->
    <g filter="url(#sevenGlow)">
      <text x="16" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
      <text x="42" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
      <text x="68" y="80" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#sevenG)">7</text>
    </g>
    <!-- JACKPOT text -->
    <g filter="url(#jackpotGlow)">
      <text x="18" y="52" font-family="Arial Black, sans-serif" font-size="5.5" font-weight="900" fill="#ffcc00" letter-spacing="2">JACKPOT</text>
    </g>
    <!-- Coin slot -->
    <rect x="44" y="90" width="12" height="3" rx="1.5" fill="#664400" stroke="#cc9900" stroke-width="1"/>
    <!-- Handle -->
    <g filter="url(#goldGlowC)">
      <line x1="90" y1="58" x2="90" y2="74" stroke="#cc9900" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="90" cy="75" r="3.5" fill="#ffcc00" stroke="#996600" stroke-width="1"/>
    </g>
    <!-- Stars/sparkles for win -->
    <g filter="url(#jackpotGlow)">
      <text x="9"  y="58" font-size="6" fill="#ffcc00">★</text>
      <text x="83" y="58" font-size="6" fill="#ffcc00">★</text>
      <text x="10" y="95" font-size="5" fill="#ffcc00">✦</text>
      <text x="82" y="95" font-size="5" fill="#ffcc00">✦</text>
    </g>
    <!-- Coins falling -->
    <g fill="#ffcc00" opacity="0.7">
      <ellipse cx="20" cy="93" rx="3.5" ry="2.5"/>
      <ellipse cx="30" cy="96" rx="3.5" ry="2.5"/>
      <ellipse cx="55" cy="94" rx="3.5" ry="2.5"/>
      <ellipse cx="68" cy="96" rx="3.5" ry="2.5"/>
      <ellipse cx="80" cy="93" rx="3.5" ry="2.5"/>
    </g>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#cc9900" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>