<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="lavaBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0500"/><stop offset="100%" stop-color="#0a0200"/>
    </linearGradient>
    <radialGradient id="lavaCrack" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600"/><stop offset="40%" stop-color="#ff2200"/><stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4400"/><stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <filter id="lavaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff4400" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z"
          fill="#1a0500"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.15"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#0f0300"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="#0f0300"/>
    <g filter="url(#lavaGlow)">
      <path d="M7,80 Q20,65 30,75 Q40,85 50,68 Q60,52 70,70 Q80,88 93,72 L93,98 L7,98 Z" fill="url(#lavaCrack)" opacity="0.9"/>
      <!-- Cracks -->
      <path d="M30,48 Q33,58 28,65 Q25,72 30,80" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
      <path d="M50,48 Q55,62 48,72 Q44,80 50,90" fill="none" stroke="#ff4400" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <path d="M70,48 Q66,60 72,70 Q76,78 70,88" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
      <path d="M50,70 Q40,74 35,80" fill="none" stroke="#ff8800" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <path d="M50,70 Q62,68 68,76" fill="none" stroke="#ff8800" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <!-- Lava pools -->
      <ellipse cx="30" cy="82" rx="8" ry="5" fill="#ff5500" opacity="0.7"/>
      <ellipse cx="65" cy="78" rx="6" ry="4" fill="#ff6600" opacity="0.6"/>
    </g>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#ff4400" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>