<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    
    <linearGradient id="stormBack" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="stripG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4488ff"/><stop offset="100%" stop-color="#ffee44"/>
    </linearGradient>
    <filter id="boltGlow" x="-40%" y="-20%" width="180%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffe044" flood-opacity="1"/>
    </filter>
    <filter id="cloudGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#4488ff" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="page1grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#d8d4c8"/>
    </linearGradient>
    <linearGradient id="page2grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e0d4"/><stop offset="100%" stop-color="#c8c4b8"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <path d="M7,22 Q7,17 12,17 L40,17 Q45,17 47,22 L53,30 L93,30 L93,93 Q93,98 88,98 L12,98 Q7,98 7,93 Z"
          fill="#0a0e1a"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="27" width="72" height="5" rx="1.5" fill="url(#page2grad)"/>
  </g>
  <g filter="url(#pShadow)">
    <rect x="14" y="31" width="72" height="5" rx="1.5" fill="url(#page1grad)"/>
  </g>
  <rect x="7" y="36" width="86" height="12" fill="url(#stripG)"/><rect x="7" y="36" width="86" height="4.5" fill="#fff" opacity="0.12"/>
  <clipPath id="bodyClip"><rect x="7" y="48" width="86" height="50" rx="5"/></clipPath>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="#05080f"/>
  
  <g clip-path="url(#bodyClip)">
    <rect x="7" y="48" width="86" height="50" fill="url(#stormBack)"/>
    <!-- Storm clouds -->
    <g filter="url(#cloudGlow)">
      <ellipse cx="35" cy="60" rx="20" ry="9" fill="#1a2244"/>
      <ellipse cx="25" cy="63" rx="14" ry="8" fill="#1e2850"/>
      <ellipse cx="45" cy="62" rx="16" ry="8" fill="#1a2244"/>
      <ellipse cx="65" cy="58" rx="18" ry="8" fill="#1a2244"/>
      <ellipse cx="57" cy="61" rx="13" ry="7" fill="#1e2850"/>
      <ellipse cx="75" cy="61" rx="14" ry="7" fill="#1a2244"/>
    </g>
    <!-- Rain streaks -->
    <g opacity="0.4" stroke="#4488ff" stroke-width="0.8" stroke-linecap="round">
      <line x1="18" y1="70" x2="15" y2="82"/>
      <line x1="26" y1="72" x2="23" y2="84"/>
      <line x1="34" y1="70" x2="31" y2="82"/>
      <line x1="42" y1="73" x2="39" y2="85"/>
      <line x1="56" y1="70" x2="53" y2="82"/>
      <line x1="64" y1="72" x2="61" y2="84"/>
      <line x1="72" y1="70" x2="69" y2="82"/>
      <line x1="80" y1="73" x2="77" y2="85"/>
      <line x1="22" y1="80" x2="19" y2="92"/>
      <line x1="38" y1="78" x2="35" y2="90"/>
      <line x1="60" y1="79" x2="57" y2="91"/>
      <line x1="76" y1="80" x2="73" y2="92"/>
    </g>
    <!-- Main lightning bolt -->
    <g filter="url(#boltGlow)">
      <polygon points="52,62 44,76 50,76 42,92 58,72 51,72" fill="#ffe044"/>
    </g>
    <!-- Secondary small bolt -->
    <g filter="url(#boltGlow)" opacity="0.5">
      <polygon points="72,64 68,73 71,73 66,82 74,70 71,70" fill="#ffe044"/>
    </g>
  </g>
  <rect x="7" y="48" width="86" height="50" rx="5" fill="none" stroke="#4466cc" stroke-width="1.2" opacity="0.3"/>
  <rect x="7" y="48" width="86" height="12" rx="5" fill="#fff" opacity="0.04"/>
  <rect x="7" y="90" width="86" height="8" rx="5" fill="#000" opacity="0.2"/>
</svg>