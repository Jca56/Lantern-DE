<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#ffe066"/>
      <stop offset="1" stop-color="#c07010"/>
    </linearGradient>
    <filter id="bgShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="gearGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f0a030" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <g filter="url(#bgShadow)">
    <rect x="16" y="16" width="224" height="224" rx="32" fill="url(#bgGrad)"/>
  </g>

  <!-- Gear icon with glow -->
  <g filter="url(#gearGlow)" transform="translate(128,128)">
    <!-- Gear teeth (12 teeth) -->
    <path d="
      M -12,-56 L 12,-56 L 16,-44 C 20,-43 24,-41 28,-38
      L 40,-42 L 52,-26 L 44,-18 C 45,-14 46,-10 46,-6
      L 58,-2 L 58,18 L 46,22 C 45,26 43,30 40,34
      L 44,46 L 28,56 L 20,46 C 16,47 12,48 8,48
      L 4,60 L -16,60 L -20,48 C -24,47 -28,46 -32,44
      L -42,52 L -54,38 L -46,28 C -48,24 -49,20 -50,16
      L -60,12 L -60,-8 L -48,-12 C -47,-16 -46,-20 -44,-24
      L -50,-36 L -36,-48 L -26,-40 C -22,-42 -18,-43 -14,-44
      Z"
      fill="url(#gearGrad)" stroke="none"/>

    <!-- Inner circle (cutout) -->
    <circle cx="-1" cy="5" r="20" fill="#0a0a0a"/>

    <!-- Small center dot -->
    <circle cx="-1" cy="5" r="6" fill="url(#gearGrad)" opacity="0.6"/>
  </g>

  <!-- Subtle slider lines in bottom right -->
  <g opacity="0.4">
    <line x1="150" y1="185" x2="210" y2="185" stroke="#d8d4cc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="175" cy="185" r="5" fill="#ffe066"/>
    <line x1="150" y1="200" x2="210" y2="200" stroke="#d8d4cc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="190" cy="200" r="5" fill="#ffe066"/>
  </g>
</svg>
